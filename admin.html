<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Of God Admin</title>

<style>

body{
  font-family: Arial, sans-serif;
  padding:20px;
  background:#f5f5f5;
}

h1{
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  box-sizing:border-box;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
}

#generateBtn{
  background:#0a7cff;
  color:white;
}

#result{
  margin-top:20px;
  text-align:center;
}

#licenseKey{
  font-size:22px;
  font-weight:bold;
  color:green;
  word-break:break-word;
}

</style>
</head>

<body>

<h1>Voice Of God Admin</h1>

<input
id="buyerName"
placeholder="Buyer Name">

<input
id="buyerWhatsapp"
placeholder="WhatsApp Number">

<input
id="buyerEmail"
placeholder="Email Address">

<input
id="bookPdf"
placeholder="Book PDF">

<input
id="package"
placeholder="Package">

<button id="generateBtn">
GENERATE LICENSE
</button>

<div id="result"></div>

<script>

function generateLicense() {

  const chars =
  "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";

  function block() {

    let result = "";

    for(let i = 0; i < 4; i++) {

      result += chars[
        Math.floor(
          Math.random() * chars.length
        )
      ];

    }

    return result;

  }

  return `VOG-${block()}-${block()}-${block()}`;

}

document
.getElementById("generateBtn")
.addEventListener("click", () => {

  const buyerName =
  document.getElementById("buyerName").value;

  const buyerWhatsapp =
  document.getElementById("buyerWhatsapp").value;

  const buyerEmail =
  document.getElementById("buyerEmail").value;

  const bookPdf =
  document.getElementById("bookPdf").value;

  const packageName =
  document.getElementById("package").value;

  const license =
  generateLicense();

  document.getElementById("result")
  .innerHTML = `

    <p>License Generated Successfully</p>

    <div id="licenseKey">
      ${license}
    </div>

    <p>
      Buyer: ${buyerName}
    </p>

  `;

});

</script>

</body>
</html>
