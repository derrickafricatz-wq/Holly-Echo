<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Of God Admin</title>

<style>

body{
  font-family: Arial, sans-serif;
  padding:20px;
  background:#f5f5f5;
}

h1{
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  box-sizing:border-box;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
}

#generateBtn{
  background:#0a7cff;
  color:white;
}

#result{
  margin-top:20px;
  text-align:center;
}

#licenseKey{
  font-size:22px;
  font-weight:bold;
  color:green;
  word-break:break-word;
}

</style>
</head>

<body>

<h1>Voice Of God Admin</h1>

<input
id="buyerName"
placeholder="Buyer Name">

<input
id="buyerWhatsapp"
placeholder="WhatsApp Number">

<input
id="buyerEmail"
placeholder="Email Address">

<input
id="bookPdf"
placeholder="Book PDF">

<input
id="package"
placeholder="Package">

<button id="generateBtn">
GENERATE LICENSE
</button>

<div id="result"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL =
"https://xbemkmvvbkxknuduthsg.supabase.co";

const SUPABASE_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhiZW1rbXZ2Ymt4a251ZHV0aHNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTUyOTgsImV4cCI6MjA5NTA3MTI5OH0.tKtlJ89jdPyeFSAaQs02Vet3SOl2LVatl4psSG9RxPI";

const client =
supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

function generateLicense() {

  const chars =
  "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";

  function block() {

    let result = "";

    for(let i = 0; i < 4; i++) {

      result += chars[
        Math.floor(
          Math.random() * chars.length
        )
      ];

    }

    return result;

  }

  return `VOG-${block()}-${block()}-${block()}`;

}

document
.getElementById("generateBtn")
.addEventListener("click", async () => {

  try {

    const buyerName =
    document.getElementById("buyerName").value.trim();

    const buyerWhatsapp =
    document.getElementById("buyerWhatsapp").value.trim();

    const buyerEmail =
    document.getElementById("buyerEmail").value.trim();

    const bookPdf =
    document.getElementById("bookPdf").value.trim();

    const packageName =
    document.getElementById("package").value.trim();

    const license =
    generateLicense();

    const { error } =
    await client
    .from("licenses")
    .insert([
      {
        key: license,
        status: "active",
        buyer_name: buyerName,
        book_pdf: bookPdf,
        package: packageName,
        buyer_whatsapp: buyerWhatsapp,
        buyer_email: buyerEmail
      }
    ]);

    if(error) {

      alert(
        "Supabase Error: " +
        error.message
      );

      return;

    }

    let buttons = "";

if (buyerWhatsapp) {

  buttons +=
  `<button id="sendWhatsapp">
     Send To WhatsApp
   </button><br><br>`;

}

if (buyerEmail) {

  buttons +=
  `<button id="sendEmail">
     Send To Email
   </button>`;

}

document.getElementById("result")
.innerHTML = `

<p>
License Generated Successfully
</p>

<div id="licenseKey">
${license}
</div>

<p>
Buyer: ${buyerName}
</p>

${buttons}

`;

    if (
  buyerWhatsapp &&
  document.getElementById(
    "sendWhatsapp"
  )
) {

  document
  .getElementById(
    "sendWhatsapp"
  )
  .addEventListener(
    "click",
    () => {

      const phone =
      buyerWhatsapp.replace(
        /\D/g,
        ""
      );

      const message =

`Hello ${buyerName},

Your Voice Of God license is:

${license}

Book: ${bookPdf}

Package: ${packageName}

Thank you.`;

      window.open(

`https://wa.me/${phone}?text=${encodeURIComponent(message)}`,

"_blank"

      );

    }

  );

}

if (
  buyerEmail &&
  document.getElementById(
    "sendEmail"
  )
) {

  document
  .getElementById(
    "sendEmail"
  )
  .addEventListener(
    "click",
    () => {

      const subject =
      "Voice Of God License";

      const body =

`Hello ${buyerName},

Your Voice Of God license is:

${license}

Book: ${bookPdf}

Package: ${packageName}

Thank you.`;

      window.location.href =

`mailto:${buyerEmail}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

    }

  );

}

  } catch(err) {

    alert(
      "Error: " + err.message
    );

  }

});

</script>

</body>
</html>
