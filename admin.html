<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Of God Admin</title>

<style>

body{
  font-family: Arial, sans-serif;
  padding:20px;
  background:#f5f5f5;
}

h1{
  text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
box-sizing:border-box;
border-radius:10px;
border:1px solid #ccc;
background:#fff;
transition:0.2s;
}

input:focus{
outline:none;
border-color:#0a7cff;
box-shadow:0 0 8px rgba(10,124,255,0.25);
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
}

#generateBtn{
  background:#0a7cff;
  color:white;
}

#result{
  margin-top:20px;
  text-align:center;
}

#licenseKey{
  font-size:22px;
  font-weight:bold;
  color:green;
  word-break:break-word;
}

</style>
</head>

<body>

  <div id="loginBox">
<h2>Admin Login</h2>

<input
id="email"
type="email"
placeholder="Email">

<input
id="password"
type="password"
placeholder="Password">

<button id="loginBtn">
LOGIN
</button>
  </div>

<div id="adminPanel" style="display:none;">

<h1>Voice Of God Admin</h1>

<input
id="buyerName"
placeholder="Buyer Name">

<input
id="buyerWhatsapp"
placeholder="WhatsApp Number">

<input
id="buyerEmail"
placeholder="Email Address">

<input
id="bookPdf"
placeholder="Book PDF">

<input
id="package"
placeholder="Package">

<input
id="authorName"
placeholder="Author Name">

<input
id="authorWhatsapp"
placeholder="Author WhatsApp">

<input
id="authorEmail"
placeholder="Author Email">

<button id="generateBtn">
GENERATE LICENSE
</button>

<div id="result"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL =
"https://xbemkmvvbkxknuduthsg.supabase.co";

const SUPABASE_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhiZW1rbXZ2Ymt4a251ZHV0aHNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTUyOTgsImV4cCI6MjA5NTA3MTI5OH0.tKtlJ89jdPyeFSAaQs02Vet3SOl2LVatl4psSG9RxPI";

const client =
supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

function generateLicense() {

  const chars =
  "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";

  function block() {

    let result = "";

    for(let i = 0; i < 4; i++) {

      result += chars[
        Math.floor(
          Math.random() * chars.length
        )
      ];

    }

    return result;

  }

  return `VOG-${block()}-${block()}-${block()}`;

}

document
.getElementById("generateBtn")
.addEventListener("click", async () => {

  try {

    const buyerName =
    document.getElementById("buyerName").value.trim();

    const buyerWhatsapp =
    document.getElementById("buyerWhatsapp").value.trim();

    const buyerEmail =
    document.getElementById("buyerEmail").value.trim();

    const bookPdf =
    document.getElementById("bookPdf").value.trim();

    const packageName =
    document.getElementById("package").value.trim();

    const authorName =
document.getElementById("authorName").value.trim();

const authorWhatsapp =
document.getElementById("authorWhatsapp").value.trim();

const authorEmail =
document.getElementById("authorEmail").value.trim();
    
    const license =
    generateLicense();

    const { error } =
    await client
    .from("licenses")
    .insert([
      {
key: license,
status: "active",

buyer_name: buyerName,
buyer_whatsapp: buyerWhatsapp,
buyer_email: buyerEmail,

book_pdf: bookPdf,
package: packageName,

author_name: authorName,
author_whatsapp: authorWhatsapp,
author_email: authorEmail
      }
    ]);

    if(error) {

      alert(
        "Supabase Error: " +
        error.message
      );

      return;

    }

   document.getElementById("result")
.innerHTML = `

<p>
License Generated Successfully
</p>

<div id="licenseKey">
${license}
</div>

<p>
Buyer: ${buyerName}
</p>

`;

const message =

`Hello ${buyerName},

Your Voice Of God license is:

${license}

Book: ${bookPdf}

Package: ${packageName}

Thank you.`;

    const authorMessage =

`Hello ${authorName},

Your book has been sold on Voice Of God.

Book: ${bookPdf}

Buyer: ${buyerName}

Package: ${packageName}

License: ${license}

Thank you.`;

if (buyerWhatsapp) {

  const phone =
  buyerWhatsapp.replace(/\D/g,"");

  setTimeout(() => {

    window.open(
      `https://wa.me/${phone}?text=${encodeURIComponent(message)}`,
      "_blank"
    );

  }, 1000);

  if(authorWhatsapp){

    const authorPhone =
    authorWhatsapp.replace(/\D/g,"");

    setTimeout(() => {

      window.open(
        `https://wa.me/${authorPhone}?text=${encodeURIComponent(authorMessage)}`,
        "_blank"
      );

    }, 3000);

  }

}

else if (buyerEmail) {

  const subject =
  "Voice Of God License";

  setTimeout(() => {

    window.location.href =

`mailto:${buyerEmail}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(message)}`;

  }, 1000);

} 

  } catch(err) {

    alert(
      "Error: " + err.message
    );

  }

});

  document
.getElementById("loginBtn")
.addEventListener("click", async () => {

  const email =
  document.getElementById("email").value;

  const password =
  document.getElementById("password").value;

  const { error } =
  await client.auth.signInWithPassword({

    email,
    password

  });

  if (error) {

alert(
"Login Failed: " +
error.message
);

return;

}

  document.getElementById(
    "loginBox"
  ).style.display = "none";

  document.getElementById(
    "adminPanel"
  ).style.display = "block";

});

</script>

</body>
</html>
