<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Voice of God | Author Portal</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#050505;
color:white;

display:flex;
justify-content:center;
align-items:center;

height:100vh;

}

.loginBox{

width:92%;
max-width:420px;

background:#111;

border:2px solid #00ffff;

border-radius:20px;

padding:30px;

text-align:center;

box-shadow:
0 0 20px rgba(0,255,255,.25);

}

.logo{

font-size:55px;

margin-bottom:10px;

}

h1{

color:#00ffff;

margin-bottom:8px;

}

.subtitle{

color:#ccc;

margin-bottom:25px;

font-size:15px;

}

input{

width:100%;

padding:14px;

margin-bottom:15px;

border:none;

border-radius:10px;

font-size:16px;

}

button{

width:100%;

padding:14px;

border:none;

border-radius:10px;

background:#00ffff;

color:black;

font-weight:bold;

font-size:16px;

cursor:pointer;

}

.create{

margin-top:20px;

font-size:14px;

color:#aaa;

}

.create a{

color:#00ffff;

text-decoration:none;

</head>

<body>

<div class="loginBox">

<div id="loginBoxContent">

<div class="logo">
📚
</div>

<h1>Author Portal</h1>

<div class="subtitle">
Sign in to manage your books and sales.
</div>

<input id="email" type="email" placeholder="Email Address">

<input id="password" type="password" placeholder="Password">

<button id="loginBtn">
LOGIN
</button>

<button id="createAccountBtn" onclick="showSignup()">
Create Author Account
</button>

</div>

  <div id="signupBox" style="display:none; margin-top:25px;">

<h2 style="
color:#00ffff;
margin-bottom:20px;
">
Create Author Account
</h2>

<input
id="fullName"
type="text"
placeholder="Full Name">

<input
id="signupEmail"
type="email"
placeholder="Email Address">

<input
id="phone"
type="tel"
placeholder="Phone Number">

<input
id="signupPassword"
type="password"
placeholder="Create Password">

<button id="registerBtn">
CREATE ACCOUNT
</button>

<div id="signupStatus" style="
margin-top:15px;
color:#00ffff;
font-size:14px;
font-weight:bold;
display:none;
"></div>

<button
id="backToLoginBtn"
onclick="showLogin()"
style="
margin-top:10px;
background:#333;
color:#fff;
">
← Back to Login
</button>

</div>

<!-- PASTE HERE -->
<div id="dashboardBox" style="display:none;">

<h2 style="color:#00ffff;text-align:center;">
📚 Author Dashboard
</h2>

<p style="text-align:center;margin-bottom:25px;">
Welcome, <b id="authorName">Loading...</b>
</p>

<div id="statsCard" style="
background:#111;
border:2px solid #00ffff;
border-radius:15px;
padding:20px;
margin-top:20px;
">

<h3 style="color:#FFD700;">
 Sales Overview
</h3>

<p>Total Books Sold: <b id="totalSold">0</b></p>

<p>Total Earnings: <b id="totalEarnings">TSh 0</b></p>

<p>Best Selling Book: <b id="bestBook">None</b></p>

</div>

 <div id="booksPerformance" style="
margin-top:20px;
background:#111;
border:2px solid #00ffff;
border-radius:15px;
padding:20px;
">

<h3 style="color:#FFD700;">
📚 Book Performance
</h3>

<div id="booksList">

No sales yet.

</div>

</div> 

  <button
id="uploadBookBtn"
onclick="toggleUploadBook()"
style="
width:100%;
margin-top:20px;
padding:15px;
background:#00ffff;
color:#000;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
">
📚 Upload New Book
</button>

  <div id="uploadBookBox" style="
display:none;
margin-top:20px;
padding:20px;
background:#111;
border:2px solid #00ffff;
border-radius:15px;
">

<h3 style="color:#00ffff;">
📚 Upload Book
</h3>

    <input
id="authorFullName"
type="text"
placeholder="Author Name"
readonly
style="
background:#222;
color:#00ffff;
font-weight:bold;
">

<input
id="bookTitle"
type="text"
placeholder="Book Title">

<input
id="bookPrice"
type="number"
placeholder="Book Price (TSh)">

<input
id="language"
type="text"
placeholder="Language (e.g. en-US or sw-TZ)">

<input
id="startReadingPage"
type="number"
placeholder="Start Reading Page">

<input
id="starterPrice"
type="number"
placeholder="Starter Package Price">

<input
id="starterPages"
type="number"
placeholder="Starter Package Pages">

<input
id="standardPrice"
type="number"
placeholder="Standard Package Price">

<input
id="standardPages"
type="number"
placeholder="Standard Package Pages">

<input
id="premiumPrice"
type="number"
placeholder="Premium Package Price">

<input
id="bookPdf"
type="file"
accept=".pdf">

<input
id="bookCover"
type="file"
accept="images/*">

<button id="saveBookBtn">
SAVE BOOK
</button>

</div>

</div>
<!-- END PASTE -->

</div>

<script>

function showSignup(){

document.getElementById("loginBoxContent").style.display = "none";
document.getElementById("signupBox").style.display = "block";

}

function showLogin(){

document.getElementById("signupBox").style.display = "none";
document.getElementById("loginBoxContent").style.display = "block";

}

  function toggleUploadBook(){

const box = document.getElementById("uploadBookBox");

box.style.display =
(box.style.display === "block") ? "none" : "block";

  }

  document.getElementById("saveBookBtn").onclick = async () => {

alert("Button clicked!");

const title = document.getElementById("bookTitle").value.trim();

const price = document.getElementById("bookPrice").value;

const language = document.getElementById("language").value.trim();

const startReadingPage = document.getElementById("startReadingPage").value;

const starterPrice = document.getElementById("starterPrice").value;

const starterPages = document.getElementById("starterPages").value;

const standardPrice = document.getElementById("standardPrice").value;

const standardPages = document.getElementById("standardPages").value;

const premiumPrice = document.getElementById("premiumPrice").value;    

const pdf = document.getElementById("bookPdf").files[0];

const cover = document.getElementById("bookCover").files[0];    

if(!title){

alert("Please enter the book title.");

return;

}

if(!price){

alert("Please enter the book price.");

return;

}

if(!pdf){

alert("Please select a PDF file.");

return;

}

if(!cover){

alert("Please select a cover image.");

return;

}    

const fileName = Date.now() + "_" + pdf.name;

const { data: uploadData, error: uploadError } = await client
.storage
.from("books")
.upload(fileName, pdf);

if(uploadError){

alert(uploadError.message);

return;

}

const coverFileName = Date.now() + "_" + cover.name;

const { data: coverUploadData, error: coverUploadError } = await client
.storage
.from("covers")
.upload(coverFileName, cover);

if(coverUploadError){

alert(coverUploadError.message);

return;

}    

await client
.from("books")
.insert({

author_id: window.currentAuthorId,

author_name: window.currentAuthorName,

title: title,

price: price,

language: language,

start_reading_page: startReadingPage,

starter_price: starterPrice,

starter_pages: starterPages,

standard_price: standardPrice,

standard_pages: standardPages,

premium_price: premiumPrice,

pdf_url: uploadData.path,

cover_url: coverUploadData.path

});

if(bookError){

alert(bookError.message);

return;

}

alert("✅ Book uploaded successfully!");

};

  </script>

<script>

 const SUPABASE_KEY =

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadSalesDashboard(){

const { data, error } = await client
.from("sales")
.select("*")
.eq("author_name", window.currentAuthorName);

if(error){

alert(error.message);

return;

}

document.getElementById("totalSold").innerText = data.length;

  let total = 0;

for(const sale of data){

total += Number(sale.author_share);

}

document.getElementById("totalEarnings").innerText =
"TSh " + total.toLocaleString();

  const counter = {};

for(const sale of data){

counter[sale.book_pdf] = (counter[sale.book_pdf] || 0) + 1;

}

let bestBook = "None";
let highest = 0;

for(const book in counter){

if(counter[book] > highest){

highest = counter[book];
bestBook = book;

}

}

document.getElementById("bestBook").innerText = bestBook;

const booksCount = {};

for (const sale of data) {

const name = sale.book_title || sale.book_pdf;

booksCount[name] = (booksCount[name] || 0) + 1;

}

let html = "";

for (const name in booksCount) {

html += `
<div style="
margin-top:12px;
padding:15px;
background:#181818;
border-radius:12px;
border-left:5px solid #00ffff;
">

<div style="
font-size:18px;
font-weight:bold;
color:white;
">
${name}
</div>

<div style="
margin-top:10px;
font-size:15px;
color:#00ffff;
font-weight:bold;
">
${booksCount[name]} Sale(s)
</div>

<div style="
margin-top:8px;
height:12px;
background:#2a2a2a;
border-radius:20px;
overflow:hidden;
">

<div style="
height:100%;
width:${Math.min(booksCount[name] * 12,100)}%;
background:linear-gradient(90deg,#00ffff,#00ff88);
border-radius:20px;
transition:.5s;
">
</div>

</div>

</div>
`;

}

document.getElementById("booksList").innerHTML = html;  

}

document.getElementById("registerBtn").onclick = async () => {

const fullName = document.getElementById("fullName").value.trim();
const email = document.getElementById("signupEmail").value.trim();
const phone = document.getElementById("phone").value.trim();
const password = document.getElementById("signupPassword").value;

const status = document.getElementById("signupStatus");

status.style.display = "block";
status.style.color = "#00ffff";
status.textContent = "Creating account...";

try {

const { data, error } = await client.auth.signUp({

email,
password,

options:{
data:{
full_name: fullName,
phone: phone
}
}

});

if(error){
throw error;
}

  const { error: insertError } = await client
.from("authors")
.insert({

user_id: data.user.id,

full_name: fullName,

email: email,

phone: phone

});

if (insertError) {
  alert(insertError.message);
  return;
  }

status.style.color = "#00ff88";
status.textContent = "✅ Account created successfully.";

console.log(data);

} catch(err) {

status.style.color = "red";
status.textContent = err.message;

console.error(err);

}

};

  document.getElementById("loginBtn").onclick = async () => {

alert("Login button clicked");

const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value;

const { data, error } = await client.auth.signInWithPassword({

email,
password

});

if(error){

alert(error.message);
return;

}

document.getElementById("loginBoxContent").style.display = "none";
document.getElementById("dashboardBox").style.display = "block";

    const user = data.user;

    document.getElementById("authorFullName").value =

 window.currentAuthorId = user.id;

 window.currentAuthorName = user.user_metadata.full_name || "Author";

 loadSalesDashboard();   
    

};

</script>
