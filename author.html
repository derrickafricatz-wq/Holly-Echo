<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Voice of God | Author Portal</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#050505;
color:white;

display:flex;
justify-content:center;
align-items:center;

height:100vh;

}

.loginBox{

width:92%;
max-width:420px;

background:#111;

border:2px solid #00ffff;

border-radius:20px;

padding:30px;

text-align:center;

box-shadow:
0 0 20px rgba(0,255,255,.25);

}

.logo{

font-size:55px;

margin-bottom:10px;

}

h1{

color:#00ffff;

margin-bottom:8px;

}

.subtitle{

color:#ccc;

margin-bottom:25px;

font-size:15px;

}

input{

width:100%;

padding:14px;

margin-bottom:15px;

border:none;

border-radius:10px;

font-size:16px;

}

button{

width:100%;

padding:14px;

border:none;

border-radius:10px;

background:#00ffff;

color:black;

font-weight:bold;

font-size:16px;

cursor:pointer;

}

.create{

margin-top:20px;

font-size:14px;

color:#aaa;

}

.create a{

color:#00ffff;

text-decoration:none;

font-weight:bold;

}

</style>

</head>

<body>

<div class="loginBox">

<div id="loginBoxContent">

<div class="logo">
📚
</div>

<h1>Author Portal</h1>

<div class="subtitle">
Sign in to manage your books and sales.
</div>

<input id="email" type="email" placeholder="Email Address">

<input id="password" type="password" placeholder="Password">

<button id="loginBtn">
LOGIN
</button>

<button id="createAccountBtn" onclick="showSignup()">
Create Author Account
</button>

</div>

  <div id="signupBox" style="display:none; margin-top:25px;">

<h2 style="
color:#00ffff;
margin-bottom:20px;
">
Create Author Account
</h2>

<input
id="fullName"
type="text"
placeholder="Full Name">

<input
id="signupEmail"
type="email"
placeholder="Email Address">

<input
id="phone"
type="tel"
placeholder="Phone Number">

<input
id="signupPassword"
type="password"
placeholder="Create Password">

<button id="registerBtn">
CREATE ACCOUNT
</button>

<div id="signupStatus" style="
margin-top:15px;
color:#00ffff;
font-size:14px;
font-weight:bold;
display:none;
"></div>

<button
id="backToLoginBtn"
onclick="showLogin()"
style="
margin-top:10px;
background:#333;
color:#fff;
">
← Back to Login
</button>

</div>

<!-- PASTE HERE -->
<div id="dashboardBox" style="display:none;">

<h2 style="color:#00ffff;">
📚 Author Dashboard
</h2>

<p>
Welcome, Author!
</p>

</div>
<!-- END PASTE -->

</div>

<script>

function showSignup(){

document.getElementById("loginBoxContent").style.display = "none";
document.getElementById("signupBox").style.display = "block";

}

function showLogin(){

document.getElementById("signupBox").style.display = "none";
document.getElementById("loginBoxContent").style.display = "block";

}

  </script>

  document.getElementById("registerBtn").onclick = async () => {

const fullName = document.getElementById("fullName").value.trim();
const email = document.getElementById("signupEmail").value.trim();
const phone = document.getElementById("phone").value.trim();
const password = document.getElementById("signupPassword").value;

}

  document.getElementById("loginBtn").onclick = async () => {

alert("Login button clicked");

const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value;

const { data, error } = await client.auth.signInWithPassword({

email,
password

});

if(error){

alert(error.message);

}

document.getElementById("loginBoxContent").style.display = "none";
document.getElementById("dashboardBox").style.display = "block";

</html>
