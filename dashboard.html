<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Voice Of God Analytics</title>

<style>

body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  padding:20px;
  margin:0;
}

h1{
  text-align:center;
}

h2{
  margin-top:30px;
}

.summary-card{
  background:white;
  padding:20px;
  margin:15px 0;
  border-radius:12px;
  text-align:center;
  box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.summary-card div{
  font-size:32px;
  font-weight:bold;
  color:#0a7cff;
}

.country-card{
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.country-name{
  font-size:18px;
  font-weight:bold;
}

.country-count{
  font-size:24px;
  color:#0a7cff;
}

</style>
</head>

<body>

<h1> Voice Of God Analytics</h1>

<div class="summary-card">
  <h2>Total Installs</h2>
  <div id="totalInstalls">0</div>
</div>

<div class="summary-card">
  <h2>Top Country</h2>
  <div id="topCountry">Loading...</div>
</div>

<h2>Country Rankings</h2>

<div id="stats">
Loading...
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL =
"https://xbemkmvvbkxknuduthsg.supabase.co";

const SUPABASE_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhiZW1rbXZ2Ymt4a251ZHV0aHNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTUyOTgsImV4cCI6MjA5NTA3MTI5OH0.tKtlJ89jdPyeFSAaQs02Vet3SOl2LVatl4psSG9RxPI";

const client =
supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

async function loadStats() {

  const { data, error } =
  await client
  .from("app_installs")
  .select("country");

  if(error){

    document.getElementById(
      "stats"
    ).innerHTML =
    "Failed to load data";

    return;

  }

  const counts = {};

  data.forEach(row => {

    const country =
    row.country || "Unknown";

    counts[country] =
    (counts[country] || 0) + 1;

  });

  document.getElementById(
    "totalInstalls"
  ).textContent = data.length;

  let topCountry = "None";
  let topCount = 0;

  let html = "";

  Object.entries(counts)

  .sort((a,b)=>b[1]-a[1])

  .forEach(([country,count],index) => {

    if(count > topCount){

      topCount = count;

      topCountry =
      `${country} (${count})`;

    }

    html += `

    <div class="country-card">

      <div class="country-name">

        #${index + 1} ${country}

      </div>

      <div class="country-count">

        ${count} installs

      </div>

    </div>

    `;

  });

  document.getElementById(
    "topCountry"
  ).textContent =
  topCountry;

  document.getElementById(
    "stats"
  ).innerHTML =
  html;

}

loadStats();

/* Auto refresh every 30 seconds */

setInterval(
  loadStats,
  30000
);

</script>

</body>
</html>
