<!DOCTYPE html>
<html>

<head>

<title>Accept Order - DEKA Market</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<style>

body{
font-family:Arial,sans-serif;
text-align:center;
padding:30px;
background:#f5f5f5;
}


.box{

background:white;
padding:25px;
border-radius:15px;
max-width:400px;
margin:auto;
box-shadow:0 5px 15px rgba(0,0,0,.1);

}


button{

width:100%;
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
background:#00ffff;
cursor:pointer;
font-weight:bold;

}


#status{

margin-top:20px;
font-weight:bold;

}

</style>


</head>


<body>


<div class="box">


<h2>Order Confirmation</h2>


<p id="orderInfo">
Loading order...
</p>


<button onclick="acceptOrder()">

ACCEPT ORDER

</button>


<p id="status"></p>


</div>



<script>


const SUPABASE_URL =
"https://xbemkmvvbkxknuduthsg.supabase.co";


const SUPABASE_KEY =
"YOUR_COMPLETE_SUPABASE_ANON_KEY";


const client = supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);



const params =
new URLSearchParams(window.location.search);



const orderId =
params.get("id");



document.getElementById("orderInfo").innerHTML =

`
Order ID:
<br>
<strong>${orderId}</strong>
`;




async function acceptOrder(){


if(!orderId){

alert("Missing order ID");

return;

}



const { data, error } = await client

.from("driver_tracking")

.update({

status:"accepted",

updated_at:new Date()

})

.eq("order_id", orderId);




if(error){

console.log(error);

document.getElementById("status").innerHTML =

"Error accepting order";


return;

}




document.getElementById("status").innerHTML =

"Order accepted. Driver can start delivery.";



}



</script>



</body>

</html>
