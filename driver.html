<!DOCTYPE html>
<html>
<head>
  <title>Driver Mode - DEKA Africa</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 25px;
      background: #f5f5f5;
    }

    .box {
      background: white;
      padding: 25px;
      border-radius: 15px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      width: 90%;
      padding: 15px;
      background: green;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
    }

    #status {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="box">

<h2>🚗 VGV1 Driver Mode</h2>

<input id="orderId" placeholder="Enter Order ID">

<br>

<button onclick="startDelivery()">
START DELIVERY 🚗
</button>

<p id="status">
Waiting...
</p>

</div>


<script>

const SUPABASE_URL = "https://xbemkmvvbkxknuduthsg.supabase.co";

    const SUPABASE_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhiZW1rbXZ2Ymt4a251ZHV0aHNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0OTUyOTgsImV4cCI6MjA5NTA3MTI5OH0.tKtlJ89jdPyeFSAaQs02Vet3SOl2LVatl4psSG9RxPI";


const client = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);


let watchID;


function startDelivery(){

const orderId =
document.getElementById("orderId").value.trim();


if(!orderId){

alert("Enter Order ID first");
return;

}


document.getElementById("status").innerHTML =
"Starting GPS... 🚗";


watchID = navigator.geolocation.watchPosition(

async function(position){


const lat = position.coords.latitude;

const lng = position.coords.longitude;


console.log(lat,lng);


const { error } = await client
.from("driver_tracking")
.upsert({

tracking_id: orderId,

driver_lat: lat,

driver_lng: lng,

status: "driver_on_way",

updated_at: new Date()

});


if(error){

console.log(error);

document.getElementById("status").innerHTML =
"GPS Update Error";

}else{


document.getElementById("status").innerHTML =
`
🚗 Driver is moving<br>
Latitude: ${lat}<br>
Longitude: ${lng}
`;

}


},


function(error){

alert(
"GPS Error: " + error.message
);

},


{
enableHighAccuracy:true,
maximumAge:0,
timeout:10000
}


);


}


</script>


</body>
</html>
